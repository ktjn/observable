x-platform-self-observability-env: &platform-self-observability-env
  OBSERVABLE_SELF_OBSERVABILITY_MODE: ${OBSERVABLE_SELF_OBSERVABILITY_MODE:-self}
  OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT: ${OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT:-http://ingest-gateway:4317}
  OBSERVABLE_SELF_OBSERVABILITY_BEARER_TOKEN: ${OBSERVABLE_SELF_OBSERVABILITY_BEARER_TOKEN:-observable-api-key-0000}

services:
  # --- INFRASTRUCTURE ---
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: observable
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
    volumes: [clickhouse_data:/var/lib/clickhouse]
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CH_USER:-default} --password ${CH_PASSWORD:-observable} --query 'SELECT 1'"]
      interval: 2s
      timeout: 2s
      retries: 30

  redpanda:
    image: redpandadata/redpanda:v25.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:9092
    ports: ["9092:19092", "9644:9644"]
    volumes: [redpanda_data:/var/lib/redpanda/data]
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 2s
      timeout: 1s
      retries: 20

  postgres:
    image: postgres:17
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${PG_DB:-observable}
      POSTGRES_USER: ${PG_USER:-observable}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-observable}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-observable}"]
      interval: 2s
      timeout: 1s
      retries: 20

  openfga:
    image: openfga/openfga:v1.15.1
    command: run
    ports: ["8080:8080", "8081:8081"]
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${PG_USER:-observable}:${PG_PASSWORD:-observable}@postgres:5432/${PG_DB:-observable}
    depends_on:
      postgres: { condition: service_healthy }

  # Makes /bootstrap writable by Zitadel's nonroot user (uid 65532) before Zitadel starts.
  zitadel-volume-init:
    image: alpine:3.23
    command: ["sh", "-c", "chmod 777 /bootstrap"]
    volumes:
      - zitadel-bootstrap:/bootstrap

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.0
    command: start-from-init --masterkeyFromEnv --tlsMode disabled --steps /zitadel-steps.yaml
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${PG_USER:-observable}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${PG_PASSWORD:-observable}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${PG_USER:-observable}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${PG_PASSWORD:-observable}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-observabledevelopermasterkey0000}
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8082
      ZITADEL_EXTERNALINSECURE: "true"
      OBSERVABLE_DEV_ADMIN_PASSWORD: ${OBSERVABLE_DEV_ADMIN_PASSWORD:-Dev@Admin1234!}
    volumes:
      - ./config/zitadel/dev-first-instance.yaml:/zitadel-steps.yaml:ro
      - zitadel-bootstrap:/bootstrap
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-volume-init:
        condition: service_completed_successfully

  zitadel-bootstrap:
    image: alpine:3.23
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add -q --no-cache curl jq openssl
        /scripts/zitadel-bootstrap.sh
    environment:
      ZITADEL_ISSUER: "http://localhost"
      OBSERVABLE_DEV_ADMIN_PASSWORD: ${OBSERVABLE_DEV_ADMIN_PASSWORD:-Dev@Admin1234!}
      ZITADEL_REDIRECT_URI: "http://localhost:${FRONTEND_PORT:-5173}/auth/callback"
    volumes:
      - zitadel-bootstrap:/bootstrap
      - ./scripts/zitadel-bootstrap.sh:/scripts/zitadel-bootstrap.sh:ro
    depends_on:
      zitadel:
        condition: service_started

  # --- SETUP & MIGRATIONS ---
  clickhouse-setup:
    image: clickhouse/clickhouse-server:25.12
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        ch_run() {
          local n=0
          until clickhouse-client --host clickhouse --user ${CH_USER:-default} --password ${CH_PASSWORD:-observable} "$@"; do
            n=$$((n+1))
            [ $$n -ge 10 ] && echo "clickhouse-client failed after 10 retries" && exit 1
            echo "Retry $$n/10 in 3s..."
            sleep 3
          done
        }
        ch_run --query "CREATE DATABASE IF NOT EXISTS observable"
        for i in {1..30}; do
          if clickhouse-client --host clickhouse --user ${CH_USER:-default} --password ${CH_PASSWORD:-observable} --query "SELECT 1" >/dev/null 2>&1; then
            break
          fi
          if [ "$$i" -eq 30 ]; then
            echo "ClickHouse did not become reachable in time" >&2
            exit 1
          fi
          sleep 1
        done
        clickhouse-client --host clickhouse --user ${CH_USER:-default} --password ${CH_PASSWORD:-observable} --query "CREATE DATABASE IF NOT EXISTS observable"
        for f in /migrations/clickhouse/*.sql; do
          echo "Applying ClickHouse migration: $$f"
          ch_run --database observable --multiquery < "$$f"
        done
    volumes: ["./migrations:/migrations:ro"]
    depends_on:
      clickhouse: { condition: service_healthy }

  postgres-setup:
    image: postgres:17
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        for f in /migrations/postgres/*.sql; do
          echo "Applying PostgreSQL migration: $$f"
          psql -v ON_ERROR_STOP=1 -U ${PG_USER:-observable} -d ${PG_DB:-observable} -h postgres -f "$$f"
        done
    environment:
      PGPASSWORD: ${PG_PASSWORD:-observable}
    volumes: ["./migrations:/migrations:ro"]
    depends_on:
      postgres: { condition: service_healthy }

  redpanda-setup:
    image: redpandadata/redpanda:v25.2.7
    entrypoint:
      - /bin/bash
      - -c
      - |
        rpk topic create telemetry.raw --brokers redpanda:9092 2>/dev/null || true
    depends_on:
      redpanda: { condition: service_healthy }

  # --- SERVICES ---
  auth-service:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /bootstrap/client_id ] && [ -s /bootstrap/client_id ]; then
          export ZITADEL_CLIENT_ID=$$(cat /bootstrap/client_id)
        fi
        exec auth-service
    environment:
      <<: *platform-self-observability-env
      DATABASE_URL: postgres://observable:observable@postgres:5432/observable
      AUTH_SERVICE_PORT: "4319"
      ZITADEL_ISSUER: http://localhost:8082
      ZITADEL_API_BASE: http://zitadel:8080
      ZITADEL_REDIRECT_URI: "http://localhost:${FRONTEND_PORT:-5173}/auth/callback"
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-for-observable-00}
      OBSERVABLE_ENV: dev
    volumes:
      - zitadel-bootstrap:/bootstrap:ro
    ports: ["4319:4319"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4319/health"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      postgres-setup: { condition: service_completed_successfully }
      zitadel-bootstrap: { condition: service_completed_successfully }

  storage-writer:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    command: ["storage-writer"]
    environment:
      <<: *platform-self-observability-env
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
      STORAGE_WRITER_PORT: "4320"
    ports: ["4320:4320"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4320/health"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      clickhouse-setup: { condition: service_completed_successfully }
      ingest-gateway: { condition: service_healthy }

  stream-processor:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    command: ["stream-processor"]
    environment:
      <<: *platform-self-observability-env
      REDPANDA_BROKERS: redpanda:9092
      INGEST_TOPIC: telemetry.raw
      STORAGE_WRITER_URL: http://storage-writer:4320
      STREAM_PROCESSOR_PLATFORM_PORT: "4323"
    ports: ["4323:4323"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4323/health"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      redpanda-setup: { condition: service_completed_successfully }
      storage-writer: { condition: service_healthy }
      ingest-gateway: { condition: service_healthy }

  ingest-gateway:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    command: ["ingest-gateway"]
    environment:
      <<: *platform-self-observability-env
      INGEST_GATEWAY_HTTP_JSON_PORT: "4318"
      INGEST_GATEWAY_GRPC_PORT: "4317"
      INGEST_GATEWAY_PLATFORM_PORT: "4321"
      DATABASE_URL: postgres://observable:observable@postgres:5432/observable
      REDPANDA_BROKERS: redpanda:9092
      INGEST_TOPIC: telemetry.raw
      AUTH_SERVICE_URL: http://auth-service:4319
    ports: ["4317:4317", "4318:4318", "4321:4321"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4318/health"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      auth-service: { condition: service_healthy }
      redpanda-setup: { condition: service_completed_successfully }
      postgres-setup: { condition: service_completed_successfully }

  query-api:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    command: ["query-api"]
    environment:
      <<: *platform-self-observability-env
      QUERY_API_PORT: "8090"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
      DATABASE_URL: postgres://observable:observable@postgres:5432/observable
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      clickhouse-setup: { condition: service_completed_successfully }
      postgres-setup: { condition: service_completed_successfully }
      ingest-gateway: { condition: service_healthy }

  alert-evaluator:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    command: ["alert-evaluator"]
    environment:
      <<: *platform-self-observability-env
      DATABASE_URL: postgres://observable:observable@postgres:5432/observable
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
      ALERT_EVALUATOR_PORT: "4322"
      ALERT_EVAL_INTERVAL_SECONDS: "60"
    ports: ["4322:4322"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4322/health"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      postgres-setup: { condition: service_completed_successfully }
      clickhouse-setup: { condition: service_completed_successfully }

  frontend:
    image: observable-frontend:local
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_OBSERVABLE_SELF_OBSERVABILITY_MODE: ${OBSERVABLE_SELF_OBSERVABILITY_MODE:-self}
        VITE_OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT: ${OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT:-http://ingest-gateway:4318}
    environment:
      VITE_OBSERVABLE_SELF_OBSERVABILITY_MODE: ${OBSERVABLE_SELF_OBSERVABILITY_MODE:-self}
      VITE_OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT: ${OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT:-http://ingest-gateway:4318}
    ports: ["${FRONTEND_PORT:-5173}:80"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 2s
      timeout: 1s
      retries: 10
    depends_on:
      query-api: { condition: service_healthy }

  # --- TESTBENCH ---
  shop-db:
    image: postgres:17
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    volumes:
      - shop_db_data:/var/lib/postgresql/data
      - ./testbench/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 2s
      timeout: 1s
      retries: 20

  shop-queue:
    image: rabbitmq:4.1-management
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: shop
      RABBITMQ_DEFAULT_PASS: shop
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 20

  shop-api:
    image: testbench-api:local
    build: { context: testbench/api }
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://shop:shop@shop-db:5432/shop
      AMQP_URL: amqp://shop:shop@shop-queue:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingest-gateway:4317
      OTEL_EXPORTER_OTLP_HEADERS: "authorization=Bearer dev-api-key-0000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 2s
      retries: 20
    depends_on:
      shop-db: { condition: service_healthy }
      shop-queue: { condition: service_healthy }
      ingest-gateway: { condition: service_healthy }

  shop-worker:
    image: testbench-worker:local
    build: { context: testbench/worker }
    environment:
      DATABASE_URL: postgresql://shop:shop@shop-db:5432/shop
      AMQP_URL: amqp://shop:shop@shop-queue:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingest-gateway:4317
      OTEL_EXPORTER_OTLP_HEADERS: "authorization=Bearer dev-api-key-0000"
    depends_on:
      shop-api: { condition: service_healthy }
      ingest-gateway: { condition: service_healthy }

  shop-loadgen:
    image: testbench-loadgen:local
    build: { context: testbench/loadgen }
    environment:
      SHOP_API_URL: http://shop-api:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingest-gateway:4317
      OTEL_EXPORTER_OTLP_HEADERS: "authorization=Bearer dev-api-key-0000"
    depends_on:
      shop-api: { condition: service_healthy }
      ingest-gateway: { condition: service_healthy }

  # --- VERIFICATION ---
  smoke-test:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    environment:
      INGEST_URL: http://ingest-gateway:4318
      GRPC_INGEST_URL: http://ingest-gateway:4317
      QUERY_URL: http://query-api:8090
    entrypoint: ["/bin/bash", "/app/tests/e2e/smoke_test.sh"]
    volumes:
      - .:/app:ro
    depends_on:
      ingest-gateway: { condition: service_healthy }
      query-api: { condition: service_healthy }
      stream-processor: { condition: service_healthy }

  perf-smoke:
    image: observable-services:local
    build: { context: ., dockerfile: Dockerfile }
    environment:
      INGEST_URL: http://ingest-gateway:4318
      QUERY_URL: http://query-api:8090
      SAMPLE_COUNT: "20"
    entrypoint: ["/bin/bash", "/app/scripts/perf-smoke.sh"]
    volumes:
      - .:/app:ro
    depends_on:
      ingest-gateway: { condition: service_healthy }
      query-api: { condition: service_healthy }
      stream-processor: { condition: service_healthy }

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    profiles: ["seed"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
      POSTGRES_URL: postgresql://${PG_USER:-observable}:${PG_PASSWORD:-observable}@postgres:5432/${PG_DB:-observable}
      SEED_PROFILE: ${SEED_PROFILE:-small}
    command: >
      python -m seed
      --profile ${SEED_PROFILE:-small}
      --clickhouse-host clickhouse
      --clickhouse-port 8123
      --clickhouse-user ${CH_USER:-default}
      --clickhouse-password ${CH_PASSWORD:-observable}
      --postgres-url postgresql://${PG_USER:-observable}:${PG_PASSWORD:-observable}@postgres:5432/${PG_DB:-observable}
    depends_on:
      clickhouse: { condition: service_healthy }
      postgres: { condition: service_healthy }

volumes:
  clickhouse_data:
  redpanda_data:
  postgres_data:
  shop_db_data:
  zitadel-bootstrap:
