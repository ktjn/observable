services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: observable
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
    volumes: [clickhouse_data:/var/lib/clickhouse]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.3.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:9092
    ports: ["9092:19092", "9644:9644"]
    volumes: [redpanda_data:/var/lib/redpanda/data]
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${PG_DB:-observable}
      POSTGRES_USER: ${PG_USER:-observable}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-observable}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-observable}"]
      interval: 5s
      timeout: 3s
      retries: 10

  openfga:
    image: openfga/openfga:v1.5
    command: run
    ports: ["8080:8080", "8081:8081"]
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${PG_USER:-observable}:${PG_PASSWORD:-observable}@postgres:5432/${PG_DB:-observable}
    depends_on:
      postgres: { condition: service_healthy }

  auth-service:
    profiles: ["services"]
    image: observable-services:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["auth-service"]
    environment:
      DATABASE_URL: postgres://observable:observable@postgres:5432/observable
      AUTH_SERVICE_PORT: "4318"
    ports: ["4318:4318"]
    depends_on:
      postgres: { condition: service_healthy }

  storage-writer:
    profiles: ["services"]
    image: observable-services:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["storage-writer"]
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
      STORAGE_WRITER_PORT: "4320"
    ports: ["4320:4320"]
    depends_on:
      clickhouse: { condition: service_healthy }

  stream-processor:
    profiles: ["services"]
    image: observable-services:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["stream-processor"]
    environment:
      REDPANDA_BROKERS: redpanda:9092
      INGEST_TOPIC: telemetry.raw
      STORAGE_WRITER_URL: http://storage-writer:4320
    depends_on:
      redpanda: { condition: service_healthy }
      storage-writer: { condition: service_started }

  ingest-gateway:
    profiles: ["services"]
    image: observable-services:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["ingest-gateway"]
    environment:
      INGEST_GATEWAY_PORT: "4317"
      REDPANDA_BROKERS: redpanda:9092
      INGEST_TOPIC: telemetry.raw
      AUTH_SERVICE_URL: http://auth-service:4318
    ports: ["4317:4317"]
    depends_on:
      auth-service: { condition: service_started }
      redpanda: { condition: service_healthy }

  query-api:
    profiles: ["services"]
    image: observable-services:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["query-api"]
    environment:
      QUERY_API_PORT: "8090"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-observable}
    ports: ["8090:8090"]
    depends_on:
      clickhouse: { condition: service_healthy }

volumes:
  clickhouse_data:
  redpanda_data:
  postgres_data:
