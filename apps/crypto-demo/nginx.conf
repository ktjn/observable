server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy SSE and API calls to the Node backend
    location ~ ^/(events|metrics|health) {
        proxy_pass http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
