# Observable infrastructure components using official community charts and images.
#
# These are intended for development and testing (e.g. kind).
# For production, use CloudNativePG and official charts with persistence/HA.

# Custom setup logic
infraSetup:
  redpanda:
    enabled: true
    topic: telemetry.raw

selfObservability:
  mode: "self"
  otlpEndpoint: "http://ingest-gateway:4318"
  # bearerToken: set this to send an Authorization: Bearer header to the ingest-gateway.
  # Use for dev/kind environments where a static key is sufficient.
  # For production, use headersSecretRef instead.
  bearerToken: ""
  deploymentEnvironment: ""
  tenant: ""
  cluster: ""
  release: ""

postgresql:
  enabled: true
  auth:
    database: observable
    username: observable
    password: observable

clickhouse:
  enabled: true
  auth:
    database: observable
    username: default
    password: observable
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

redpanda:
  enabled: true
  image:
    repository: redpandadata/redpanda
    tag: v26.1.1
  # Redpanda process memory (passed to --memory). Must be less than resources.limits.memory.
  processMemory: 400M
  resources:
    limits:
      memory: 500Mi
      cpu: "1"
    requests:
      memory: 500Mi
      cpu: "1"

openfga:
  fullnameOverride: openfga
  replicaCount: 1
  datastore:
    engine: memory
    applyMigrations: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
