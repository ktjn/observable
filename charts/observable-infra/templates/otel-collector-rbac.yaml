{{- if .Values.selfObservability.bearerToken }}
# ServiceAccount used by the self-observability OTel collectors (node-agent
# DaemonSet and k8s-metrics Deployment) to authenticate with the kube-apiserver.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: observable-otelcol
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: observable
    app.kubernetes.io/component: self-observability-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observable-otelcol
  labels:
    app.kubernetes.io/part-of: observable
    app.kubernetes.io/component: self-observability-collector
rules:
  # k8s_cluster receiver: read all workload/namespace/quota metadata
  - apiGroups: [""]
    resources:
      - events
      - namespaces
      - namespaces/status
      - nodes
      - nodes/spec
      - pods
      - pods/status
      - replicationcontrollers
      - replicationcontrollers/status
      - resourcequotas
      - services
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [daemonsets, deployments, replicasets, statefulsets]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [get, list, watch]
  # kubeletstats receiver: access per-node kubelet stats endpoint
  - apiGroups: [""]
    resources: [nodes/stats, nodes/proxy]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observable-otelcol
  labels:
    app.kubernetes.io/part-of: observable
    app.kubernetes.io/component: self-observability-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observable-otelcol
subjects:
  - kind: ServiceAccount
    name: observable-otelcol
    namespace: {{ .Release.Namespace }}
{{- end }}
