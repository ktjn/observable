{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresql.auth.username }}
  password: {{ .Values.postgresql.auth.password }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    observable.com/self-observability-mode: {{ .Values.selfObservability.mode | quote }}
    observable.com/self-observability-otlp-endpoint: {{ .Values.selfObservability.otlpEndpoint | quote }}
spec:
  instances: 1
  # Use official CloudNativePG image (which is official Postgres + CNPG tools)
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: {{ .Values.postgresql.auth.database }}
      owner: {{ .Values.postgresql.auth.username }}
      secret:
        name: postgres-auth
      postInitSQL:
        # Zitadel's init job creates its own DB role; the app user needs CREATEROLE.
        - ALTER USER {{ .Values.postgresql.auth.username }} CREATEROLE CREATEDB;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    # CloudNativePG uses these labels for the primary service
    cnpg.io/cluster: postgres
    role: primary
{{- end }}
