# charts/observable/charts/zitadel/values.yaml
# Helm chart: zitadel/zitadel (pin to chart version matching Zitadel 2.71.x)
#
# Add this as a dependency in charts/observable/Chart.yaml:
#   - name: zitadel
#     version: "7.x.x"       # check https://charts.zitadel.com for the version pinned to 2.71.x
#     repository: "https://charts.zitadel.com"
#     condition: zitadel.enabled

zitadel:
  enabled: true

  image:
    tag: "v2.71.0"

  zitadel:
    masterKey:
      existingSecret: zitadel-masterkey
      existingSecretKey: masterkey

    configmapConfig:
      ExternalDomain: ""          # set per-environment in values override
      ExternalPort: 443
      ExternalSecure: true
      TLS:
        Enabled: false            # TLS terminated by ingress

    dbSslCaCrt: ""

  env:
    - name: ZITADEL_DATABASE_POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: host
    - name: ZITADEL_DATABASE_POSTGRES_PORT
      value: "5432"
    - name: ZITADEL_DATABASE_POSTGRES_DATABASE
      value: zitadel
    - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: username
    - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: password
    - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
      value: require
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: username
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: password
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
      value: require

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: ""                  # set per-environment, e.g. id.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: zitadel-tls
        hosts:
          - ""                    # matches host above

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  replicaCount: 2

  podDisruptionBudget:
    enabled: true
    minAvailable: 1
