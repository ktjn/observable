# Observable platform Helm values.
#
# Environment-variable names mirror docker-compose.yml so operators can
# cross-reference the two definitions without separate documentation.
# Override per-environment in a separate values file:
#   helm install observable ./charts/observable -f values.prod.yaml

global:
  image:
    # Built from the repo-root Dockerfile.  In CI set to the immutable commit-tag.
    repository: observable-services
    tag: "latest"
    pullPolicy: IfNotPresent
  frontendImage:
    repository: observable-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

# Infrastructure connection strings.
# These are consumed by multiple services and centralised here to avoid
# repetition.  They must be overridden in production (use ExternalSecret or
# a sealed-secrets file).
clickhouse:
  url: "http://clickhouse:8123"
  user: "default"
  password: "observable"
  database: "observable"

postgres:
  # Must include credentials; rotate via ExternalSecret in production.
  url: "postgres://observable:observable@postgres:5432/observable"
  user: "observable"
  password: "observable"

redpanda:
  brokers: "redpanda:9093"
  ingestTopic: "telemetry.raw"

selfObservability:
  # Supported modes:
  # - self: emit platform telemetry to this release's system tenant.
  # - observer_instance: emit platform telemetry to a second Observable instance.
  mode: "self"
  otlpEndpoint: "http://ingest-gateway:4317"
  # bearerToken: set to the plaintext API key for the observable-internal ingestion key.
  # The corresponding key must exist in the api_keys table with environment='observable'.
  bearerToken: ""

# Per-service configuration.
# Each block maps directly to one Deployment + one Service (except
# streamProcessor which is headless).
services:
  authService:
    enabled: true
    port: 4319
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  ingestGateway:
    enabled: true
    port: 4318
    grpcPort: 4317
    platformPort: 4321
    replicas: 1
    # Canary deployment settings.  Set canary.enabled=true and canary.tag to
    # a new image tag to deploy a second ingest-gateway alongside stable for
    # analysis-gated promotion (see scripts/canary-promote.sh).
    canary:
      enabled: false
      tag: ""      # defaults to global.image.tag when blank
      replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  # stream-processor has no HTTP listener; no Service is created.
  streamProcessor:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  storageWriter:
    enabled: true
    port: 4320
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  queryApi:
    enabled: true
    port: 8090
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  alertEvaluator:
    enabled: true
    port: 4322
    replicas: 1
    # Interval at which the evaluator polls for alert conditions (seconds).
    evalIntervalSeconds: "60"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  frontend:
    enabled: true
    port: 80
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# Zitadel identity provider (subchart: zitadel/zitadel 8.13.4).
# Image is pinned to v2.71.0 (compose baseline) via the image.tag override.
# ExternalDomain/ExternalPort must match the URL where the browser reaches Zitadel.
# In k8s, Zitadel is proxied through the frontend nginx (see frontend-nginx-configmap.yaml),
# so ExternalPort should match the port where the frontend is accessible (8080 for the
# testbench gateway NodePort, or whatever kubectl port-forward maps to the frontend).
# For production override ExternalDomain + ExternalPort to your ingress hostname + 443.
# auth-service uses ZITADEL_API_BASE (in-cluster service) for server-side calls
# and ZITADEL_ISSUER (ExternalDomain:ExternalPort) for building browser auth redirects.
zitadel:
  enabled: true
  replicaCount: 1
  image:
    tag: "v2.71.0"
  configMap:
    annotations:
      helm.sh/hook: pre-install,pre-upgrade
      helm.sh/hook-delete-policy: before-hook-creation
      helm.sh/hook-weight: "0"
  setupJob:
    machinekeyWriter:
      image:
        tag: latest
  # fsGroup keeps mounted config/secret volumes group-readable by Zitadel's uid
  # (65532) without requiring a root init container.
  podSecurityContext:
    fsGroup: 65532
  zitadel:
    masterkey: "observabledevelopermasterkey0000"
    configmapConfig:
      ExternalDomain: localhost
      ExternalPort: 8080
      ExternalSecure: false
      TLS:
        Enabled: false
      FirstInstance:
        InstanceName: Observable Dev
        Org:
          Name: Observable
          Machine:
            Machine:
              UserName: bootstrap-sa
              Name: Bootstrap Service Account
            MachineKey:
              Type: 1
              ExpirationDate: "2099-01-01T00:00:00Z"
          Human:
            UserName: admin
            FirstName: Dev
            LastName: Admin
            Email:
              Address: admin@dev.observable
              IsEmailVerified: true
            Password: Dev@Admin1234!
            PasswordChangeRequired: false
    dbSslCaCrt: ""
  env:
    - name: ZITADEL_DATABASE_POSTGRES_HOST
      value: postgres
    - name: ZITADEL_DATABASE_POSTGRES_PORT
      value: "5432"
    - name: ZITADEL_DATABASE_POSTGRES_DATABASE
      value: zitadel
    - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
      valueFrom:
        secretKeyRef:
          name: postgres-auth
          key: username
    - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-auth
          key: password
    - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
      value: disable
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
      valueFrom:
        secretKeyRef:
          name: postgres-auth
          key: username
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-auth
          key: password
    - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
      value: disable
  ingress:
    enabled: false
  podDisruptionBudget:
    enabled: false

# OIDC / session settings consumed by auth-service.
# issuer defaults to http://{ExternalDomain}:{ExternalPort} (browser-reachable, matches token iss).
# apiBase defaults to the in-cluster Zitadel service URL ({release-name}-zitadel:8080) for server-side calls.
identity:
  issuer: ""
  apiBase: ""
  clientId: ""
  redirectUri: "http://localhost:8080/auth/callback"
  sessionSecret: "dev-session-secret-for-observable-00"
  env: "dev"

# Kubernetes Gateway API — exposes Zitadel via an HTTPRoute attached to a
# managed Gateway.  Requires a Gateway API controller already installed in the
# cluster (e.g. Envoy Gateway, Cilium, nginx-gateway-fabric).
#
# When enabled, auth-service derives ZITADEL_ISSUER from
# gateway.zitadel.hostname + gateway.port automatically (identity.issuer
# still overrides if set).  You must also align the Zitadel subchart so its
# token iss claim matches:
#   zitadel.zitadel.configmapConfig.ExternalDomain: <gateway.zitadel.hostname>
#   zitadel.zitadel.configmapConfig.ExternalPort:   <gateway.port>
gateway:
  enabled: false
  className: ""     # required: e.g. "envoy-gateway", "nginx", "cilium"
  port: 80
  zitadel:
    hostname: ""    # e.g. "auth.example.com" — omit to match all hostnames

# Migration job settings (pre-install / pre-upgrade Helm hook).
migrations:
  # BackoffLimit for the migration Job before Helm marks the hook failed.
  backoffLimit: 3
  # ConfigMap names that must exist before helm install.
  # Created by scripts/kind-test.sh (kind) or the release pipeline (CI).
  postgresConfigMap: observable-migrations-postgres
  clickhouseConfigMap: observable-migrations-clickhouse
