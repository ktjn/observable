{{- if .Values.services.ingestGateway.canary.enabled -}}
{{- $canaryTag := .Values.services.ingestGateway.canary.tag | default .Values.global.image.tag -}}
{{- $env := list
    (dict "name" "INGEST_GATEWAY_PORT" "value" (toString .Values.services.ingestGateway.port))
    (dict "name" "REDPANDA_BROKERS"    "value" .Values.redpanda.brokers)
    (dict "name" "INGEST_TOPIC"        "value" .Values.redpanda.ingestTopic)
    (dict "name" "AUTH_SERVICE_URL"    "value" (printf "http://auth-service:%d" (int .Values.services.authService.port)))
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_MODE" "value" .Values.selfObservability.mode)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT" "value" .Values.selfObservability.otlpEndpoint) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-gateway-canary
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: observable
    app.kubernetes.io/component: ingest-gateway
    track: canary
spec:
  replicas: {{ .Values.services.ingestGateway.canary.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ingest-gateway-canary
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: observable
        app.kubernetes.io/name: ingest-gateway-canary
        app.kubernetes.io/component: ingest-gateway
        track: canary
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: ingest-gateway-canary
          image: {{ .Values.global.image.repository }}:{{ $canaryTag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          command: ["ingest-gateway"]
          ports:
            - name: http
              containerPort: {{ .Values.services.ingestGateway.port }}
              protocol: TCP
          env:
            {{- range $env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.ingestGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-gateway-canary
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: observable
    app.kubernetes.io/component: ingest-gateway
    track: canary
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ingest-gateway-canary
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.services.ingestGateway.port }}
      targetPort: http
      protocol: TCP
{{- end }}
