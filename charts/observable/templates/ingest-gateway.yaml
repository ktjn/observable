{{- if .Values.services.ingestGateway.enabled -}}
{{- $selectorCtx := dict "name" "ingest-gateway" "Release" .Release -}}
{{- $env := list
    (dict "name" "INGEST_GATEWAY_HTTP_JSON_PORT" "value" (toString .Values.services.ingestGateway.port))
    (dict "name" "INGEST_GATEWAY_GRPC_PORT"     "value" (toString .Values.services.ingestGateway.grpcPort))
    (dict "name" "INGEST_GATEWAY_PLATFORM_PORT" "value" (toString .Values.services.ingestGateway.platformPort))
    (dict "name" "REDPANDA_BROKERS"         "value" .Values.redpanda.brokers)
    (dict "name" "INGEST_TOPIC"             "value" .Values.redpanda.ingestTopic)
    (dict "name" "AUTH_SERVICE_URL"         "value" (printf "http://auth-service:%d" (int .Values.services.authService.port)))
    (dict "name" "DATABASE_URL"             "value" .Values.postgres.url)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_MODE" "value" .Values.selfObservability.mode)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT" "value" .Values.selfObservability.otlpEndpoint) -}}

{{- /* We override the deployment and service to handle multiple ports since common library is single-port */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-gateway
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-gateway
spec:
  replicas: {{ .Values.services.ingestGateway.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "observable-common.selectorLabels" $selectorCtx | nindent 6 }}
      app.kubernetes.io/component: ingest-gateway
  template:
    metadata:
      labels:
        {{- include "observable-common.labels" . | nindent 8 }}
        {{- include "observable-common.selectorLabels" $selectorCtx | nindent 8 }}
        app.kubernetes.io/component: ingest-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: ingest-gateway
          image: {{ include "observable-common.image" . }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy | default "IfNotPresent" }}
          command: ["ingest-gateway"]
          ports:
            - name: http
              containerPort: {{ .Values.services.ingestGateway.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.services.ingestGateway.grpcPort }}
              protocol: TCP
            - name: platform
              containerPort: {{ .Values.services.ingestGateway.platformPort }}
              protocol: TCP
          env:
            {{- range $env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.ingestGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-gateway
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-gateway
spec:
  type: ClusterIP
  selector:
    {{- include "observable-common.selectorLabels" $selectorCtx | nindent 4 }}
    app.kubernetes.io/component: ingest-gateway
  ports:
    - name: http
      port: {{ .Values.services.ingestGateway.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.services.ingestGateway.grpcPort }}
      targetPort: grpc
      protocol: TCP
    - name: platform
      port: {{ .Values.services.ingestGateway.platformPort }}
      targetPort: platform
      protocol: TCP
{{- end }}
