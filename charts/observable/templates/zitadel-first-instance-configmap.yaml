{{- if and .Values.services.authService.enabled .Values.zitadel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: zitadel-first-instance-config
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-bootstrap
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  first-instance.yaml: |
    FirstInstance:
      InstanceName: Observable Dev
      MachineKeyPath: /bootstrap/sa-key.json
      Org:
        Name: Observable
        Machine:
          Machine:
            UserName: bootstrap-sa
            Name: Bootstrap Service Account
          MachineKey:
            Type: 1
            ExpirationDate: "2099-01-01T00:00:00Z"
        Human:
          UserName: admin
          FirstName: Dev
          LastName: Admin
          Email:
            Address: admin@dev.observable
            IsEmailVerified: true
          Password: Dev@Admin1234!
          PasswordChangeRequired: false
{{- end }}
