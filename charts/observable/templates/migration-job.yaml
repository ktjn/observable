{{/*
Pre-install / pre-upgrade hook Job that applies PostgreSQL and ClickHouse migrations.

The Job expects two ConfigMaps to exist in the release namespace before helm install:
  - {{ .Values.migrations.postgresConfigMap }}   (one key per .sql file)
  - {{ .Values.migrations.clickhouseConfigMap }}  (one key per .sql file)

Create them from the repo root before running helm install:
  kubectl create configmap observable-migrations-postgres \
    --from-file=migrations/postgres/ --namespace <ns>
  kubectl create configmap observable-migrations-clickhouse \
    --from-file=migrations/clickhouse/ --namespace <ns>

The init-container pattern mirrors docker-compose.yml:
  postgres-setup    → psql against each SQL file
  clickhouse-setup  → clickhouse-client against each SQL file
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "observable-common.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Step 1: PostgreSQL migrations (mirrors postgres-setup in docker-compose.yml)
        - name: postgres-migrate
          image: postgres:16
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              for f in /migrations/postgres/*.sql; do
                echo "Applying PostgreSQL migration: $f"
                psql -f "$f"
              done
              echo "PostgreSQL migrations complete."
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: observable
            - name: PGUSER
              value: {{ .Values.postgres.user | default "observable" | quote }}
            - name: PGPASSWORD
              value: {{ .Values.postgres.password | default "observable" | quote }}
          volumeMounts:
            - name: postgres-migrations
              mountPath: /migrations/postgres
      # Step 2: ClickHouse migrations (mirrors clickhouse-setup in docker-compose.yml)
      containers:
        - name: clickhouse-migrate
          image: clickhouse/clickhouse-server:24.3
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              clickhouse-client \
                --host clickhouse \
                --user "$CLICKHOUSE_USER" \
                --password "$CLICKHOUSE_PASSWORD" \
                --query "CREATE DATABASE IF NOT EXISTS {{ .Values.clickhouse.database | default "observable" }}"
              for f in /migrations/clickhouse/*.sql; do
                echo "Applying ClickHouse migration: $f"
                clickhouse-client \
                  --host clickhouse \
                  --user "$CLICKHOUSE_USER" \
                  --password "$CLICKHOUSE_PASSWORD" \
                  --multiquery < "$f"
              done
              echo "ClickHouse migrations complete."
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.clickhouse.password | quote }}
          volumeMounts:
            - name: clickhouse-migrations
              mountPath: /migrations/clickhouse
      volumes:
        - name: postgres-migrations
          configMap:
            name: {{ .Values.migrations.postgresConfigMap }}
        - name: clickhouse-migrations
          configMap:
            name: {{ .Values.migrations.clickhouseConfigMap }}
