{{- if and .Values.services.authService.enabled .Values.zitadel.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-zitadel-first-instance
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-bootstrap
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "observable-common.labels" . | nindent 8 }}
        app.kubernetes.io/component: zitadel-bootstrap
    spec:
      serviceAccountName: zitadel-bootstrap
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 65532
      volumes:
        - name: config
          configMap:
            name: zitadel-config-yaml
        - name: bootstrap
          emptyDir: {}
        - name: first-instance
          configMap:
            name: zitadel-first-instance-config
      containers:
        - name: zitadel-first-instance
          image: "ghcr.io/zitadel/zitadel:{{ .Values.zitadel.image.tag }}"
          args:
            - setup
            - --masterkeyFromEnv
            - --config
            - /config/zitadel-config-yaml
            - --steps
            - /first-instance/first-instance.yaml
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: zitadel-masterkey
                  key: masterkey
            {{- toYaml .Values.zitadel.env | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: bootstrap
              mountPath: /bootstrap
            - name: first-instance
              mountPath: /first-instance
        - name: bootstrap-secret-writer
          image: alpine:3.20
          env:
            - name: SECRET_NAME
              value: bootstrap-sa
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              apk add --no-cache curl > /dev/null 2>&1

              KEY_FILE=/bootstrap/sa-key.json
              echo "bootstrap-secret-writer: waiting for key at $KEY_FILE ..."
              i=0
              until [ -f "$KEY_FILE" ] && [ -s "$KEY_FILE" ]; do
                i=$((i+1)); [ $i -ge 90 ] && { echo "bootstrap-secret-writer: timed out waiting for key" >&2; exit 1; }
                sleep 2
              done

              TOKEN_K8S=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KEY_B64=$(base64 < "$KEY_FILE" | tr -d '\n')
              SECRET_BODY="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"$SECRET_NAME\",\"namespace\":\"$NAMESPACE\"},\"data\":{\"${SECRET_NAME}.json\":\"$KEY_B64\"}}"

              create_or_update_secret() {
                _status=$(curl -sk -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $TOKEN_K8S" \
                  "https://kubernetes.default.svc/api/v1/namespaces/$NAMESPACE/secrets/$SECRET_NAME")
                if [ "$_status" = "404" ]; then
                  curl -sk -X POST \
                    -H "Authorization: Bearer $TOKEN_K8S" \
                    -H "Content-Type: application/json" \
                    "https://kubernetes.default.svc/api/v1/namespaces/$NAMESPACE/secrets" \
                    -d "$SECRET_BODY" > /dev/null
                else
                  curl -sk -X PUT \
                    -H "Authorization: Bearer $TOKEN_K8S" \
                    -H "Content-Type: application/json" \
                    "https://kubernetes.default.svc/api/v1/namespaces/$NAMESPACE/secrets/$SECRET_NAME" \
                    -d "$SECRET_BODY" > /dev/null
                fi
              }

              i=0
              until create_or_update_secret; do
                i=$((i+1)); [ $i -ge 30 ] && { echo "bootstrap-secret-writer: failed to write secret" >&2; exit 1; }
                sleep 2
              done

              echo "bootstrap-secret-writer: secret $SECRET_NAME written."
{{- end }}
