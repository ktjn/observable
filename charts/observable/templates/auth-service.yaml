{{- if .Values.services.authService.enabled -}}
{{- $zitadelBase := printf "http://%s-zitadel:8080" .Release.Name -}}
{{- $env := list
    (dict "name" "DATABASE_URL"      "value" .Values.postgres.url)
    (dict "name" "AUTH_SERVICE_PORT" "value" (toString .Values.services.authService.port))
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_MODE" "value" .Values.selfObservability.mode)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT" "value" .Values.selfObservability.otlpEndpoint)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_BEARER_TOKEN" "value" .Values.selfObservability.bearerToken)
    (dict "name" "ZITADEL_ISSUER"       "value" (coalesce .Values.identity.issuer $zitadelBase))
    (dict "name" "ZITADEL_API_BASE"     "value" (coalesce .Values.identity.apiBase $zitadelBase))
    (dict "name" "ZITADEL_CLIENT_ID"    "value" .Values.identity.clientId)
    (dict "name" "ZITADEL_REDIRECT_URI" "value" .Values.identity.redirectUri)
    (dict "name" "SESSION_SECRET"       "value" .Values.identity.sessionSecret)
    (dict "name" "OBSERVABLE_ENV"       "value" .Values.identity.env) -}}
{{- $ctx := dict
    "name"    "auth-service"
    "command" "auth-service"
    "port"    .Values.services.authService.port
    "service" .Values.services.authService
    "env"     $env
    "Values"  .Values
    "Chart"   .Chart
    "Release" .Release -}}
{{ include "observable-common.deployment" $ctx }}
---
{{ include "observable-common.service" $ctx }}
{{- end }}
