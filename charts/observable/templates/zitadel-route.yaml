{{- if .Values.gateway.enabled -}}
{{- $gatewayName := .Values.gateway.name | default "testbench-gateway" -}}
{{- $gatewaySectionName := .Values.gateway.sectionName | default "observable" -}}
{{- $zitadelHostname := .Values.gateway.zitadel.hostname -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-zitadel
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ .Release.Namespace }}
      sectionName: {{ $gatewaySectionName }}
  {{- if $zitadelHostname }}
  hostnames:
    - {{ $zitadelHostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth
        - path:
            type: PathPrefix
            value: /oidc
        - path:
            type: PathPrefix
            value: /.well-known
        - path:
            type: PathPrefix
            value: /ui
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: Host
                value: "{{ .Values.zitadel.zitadel.configmapConfig.ExternalDomain }}:{{ .Values.zitadel.zitadel.configmapConfig.ExternalPort }}"
      backendRefs:
        - name: {{ .Release.Name }}-zitadel
          port: 8080
{{- end }}
