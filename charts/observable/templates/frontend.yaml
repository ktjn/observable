{{- if .Values.services.frontend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.services.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "observable-common.selectorLabels" (dict "name" "frontend" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "observable-common.labels" . | nindent 8 }}
        {{- include "observable-common.selectorLabels" (dict "name" "frontend" "Release" .Release) | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.global.frontendImage.repository }}:{{ .Values.global.frontendImage.tag | default "latest" }}
          imagePullPolicy: {{ .Values.global.frontendImage.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.services.frontend.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "observable-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "observable-common.selectorLabels" (dict "name" "frontend" "Release" .Release) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.frontend.port }}
      targetPort: http
      protocol: TCP
{{- end }}
