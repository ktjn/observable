{{- if .Values.services.streamProcessor.enabled -}}
{{- $env := list
    (dict "name" "REDPANDA_BROKERS"                   "value" .Values.redpanda.brokers)
    (dict "name" "INGEST_TOPIC"                       "value" .Values.redpanda.ingestTopic)
    (dict "name" "STORAGE_WRITER_URL"                 "value" (printf "http://storage-writer:%d" (int .Values.services.storageWriter.port)))
    (dict "name" "STREAM_PROCESSOR_PLATFORM_PORT"     "value" (toString .Values.services.streamProcessor.platformPort))
    (dict "name" "OBSERVABLE_ENV"                    "value" .Values.identity.env)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_MODE" "value" .Values.selfObservability.mode)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_OTLP_ENDPOINT" "value" .Values.selfObservability.otlpEndpoint)
    (dict "name" "OBSERVABLE_SELF_OBSERVABILITY_BEARER_TOKEN" "value" .Values.selfObservability.bearerToken) -}}
{{- $ctx := dict
    "name"    "stream-processor"
    "command" "stream-processor"
    "port"    .Values.services.streamProcessor.platformPort
    "service" .Values.services.streamProcessor
    "env"     $env
    "Values"  .Values
    "Chart"   .Chart
    "Release" .Release -}}
{{ include "observable-common.deployment" $ctx }}
{{- end }}
