apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-loadgen
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: shop-loadgen
    app.kubernetes.io/part-of: observable-testbench
spec:
  replicas: {{ .Values.loadgen.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: shop-loadgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shop-loadgen
        app.kubernetes.io/part-of: observable-testbench
    spec:
      containers:
        - name: shop-loadgen
          image: {{ .Values.loadgen.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SHOP_API_URL
              value: "http://shop-api.{{ .Release.Namespace }}.svc.cluster.local:8000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector-gateway.{{ .Release.Namespace }}.svc.cluster.local:4317"
            - name: SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources: {{- toYaml .Values.loadgen.resources | nindent 12 }}
