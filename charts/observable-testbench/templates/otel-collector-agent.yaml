apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector-agent
data:
  collector.yaml: |
    receivers:
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups: [node, pod, container, volume]
      filelog:
        include:
          - /var/log/containers/*.log
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
            id: container-parser

    processors:
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: connection
      resource:
        attributes:
          - key: deployment.environment
            value: testbench
            action: upsert
          - key: k8s.cluster.name
            value: {{ .Values.clusterName | quote }}
            action: upsert
      batch:
        send_batch_size: 256
        timeout: 5s

    exporters:
      otlp/gateway:
        endpoint: "otel-collector-gateway.{{ .Release.Namespace }}.svc.cluster.local:4317"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [kubeletstats]
          processors: [k8sattributes, resource, batch]
          exporters: [otlp/gateway]
        logs:
          receivers: [filelog]
          processors: [k8sattributes, resource, batch]
          exporters: [otlp/gateway]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector-agent
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector-agent
        app.kubernetes.io/part-of: observable-testbench
    spec:
      serviceAccountName: otel-collector
      # Needs host-level access for kubeletstats and filelog
      hostNetwork: false
      containers:
        - name: agent
          image: {{ .Values.otelCollector.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config=/etc/otelcol/collector.yaml"]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: dockercontainerdir
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources: {{- toYaml .Values.otelCollector.agent.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: otel-collector-agent-config
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: dockercontainerdir
          hostPath:
            path: /var/lib/docker/containers
