apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: shop-frontend
    app.kubernetes.io/part-of: observable-testbench
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: shop-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shop-frontend
        app.kubernetes.io/part-of: observable-testbench
    spec:
      containers:
        - name: shop-frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { containerPort: 3000 }
          env:
            - name: SHOP_API_URL
              value: "http://shop-api.{{ .Release.Namespace }}.svc.cluster.local:8000"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-gateway.{{ .Release.Namespace }}.svc.cluster.local:4317"
            - name: SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: shop-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: shop-frontend
    app.kubernetes.io/part-of: observable-testbench
spec:
  selector:
    app.kubernetes.io/name: shop-frontend
  ports:
    - { port: 3000, targetPort: 3000 }
