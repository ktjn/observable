apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-gateway-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector-gateway
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure]
        allocatable_types_to_report: [cpu, memory, storage]
      k8sobjects:
        objects:
          - name: events
            mode: watch
            group: events.k8s.io

    processors:
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: connection
      resource:
        attributes:
          - key: deployment.environment
            value: testbench
            action: upsert
          - key: k8s.cluster.name
            value: {{ .Values.clusterName | quote }}
            action: upsert
      batch:
        send_batch_size: 256
        timeout: 5s

    exporters:
      otlphttp/observable:
        endpoint: {{ .Values.observableEndpoint | quote }}
        headers:
          Authorization: "Bearer {{ .Values.observableApiKey }}"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp/observable]
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp/observable]
        logs:
          receivers: [otlp, k8sobjects]
          processors: [resource, batch]
          exporters: [otlphttp/observable]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector-gateway
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector-gateway
        app.kubernetes.io/part-of: observable-testbench
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: {{ .Values.otelCollector.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config=/etc/otelcol/collector.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317, protocol: TCP }
            - { name: otlp-http, containerPort: 4318, protocol: TCP }
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          resources: {{- toYaml .Values.otelCollector.gateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: otel-collector-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector-gateway
    app.kubernetes.io/part-of: observable-testbench
spec:
  selector:
    app.kubernetes.io/name: otel-collector-gateway
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
