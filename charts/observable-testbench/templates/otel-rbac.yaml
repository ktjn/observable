apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-otel-collector
  labels:
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector
rules:
  # k8sattributes processor: pod/namespace/node metadata lookup
  - apiGroups: [""]
    resources: [pods, namespaces, nodes, replicationcontrollers]
    verbs: [get, list, watch]
  # k8s_cluster receiver: workload and quota metrics
  - apiGroups: [""]
    resources: [resourcequotas, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  # k8sobjects receiver: event watching
  - apiGroups: ["", events.k8s.io]
    resources: [events]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-otel-collector
  labels:
    app.kubernetes.io/part-of: observable-testbench
    app.kubernetes.io/component: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: {{ .Release.Namespace }}
