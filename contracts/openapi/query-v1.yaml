openapi: "3.1.0"
info:
  title: Observable Query API
  version: "1.0.0"
paths:
  /v1/traces/{trace_id}:
    get:
      summary: Get trace by ID
      operationId: getTrace
      parameters:
        - name: trace_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trace with all spans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceResponse"
        "404": { description: Not found }
        "401": { description: Unauthorized }
  /v1/traces:
    get:
      summary: Search traces
      operationId: searchTraces
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        "200":
          description: List of traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceListResponse"
  /v1/logs:
    get:
      summary: Search logs
      operationId: searchLogs
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        "200":
          description: List of log records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogListResponse"
  /v1/logs/histogram:
    get:
      summary: Get log distribution histogram
      operationId: logHistogram
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: interval
          in: query
          schema: { type: string, example: 1m }
      responses:
        "200":
          description: Histogram data
  /v1/logs/tail:
    get:
      summary: Live tail logs
      operationId: tailLogs
      parameters:
        - name: service
          in: query
          schema: { type: string }
        - name: since_unix_nano
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of new log records
  /v1/logs/{log_id}/context:
    get:
      summary: Get log context (surrounding logs)
      operationId: getLogContext
      parameters:
        - name: log_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Logs surrounding the specified log line
  /v1/metrics:
    get:
      summary: List metric catalog entries
      operationId: listMetrics
      parameters:
        - name: service
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Metric catalog
  /v1/metrics/points:
    get:
      summary: Get aggregated metric points
      operationId: getMetricPoints
      parameters:
        - name: metric_name
          in: query
          required: true
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Aggregated points
  /v1/topology:
    get:
      summary: Get service topology
      operationId: getTopology
      responses:
        "200":
          description: Service relationship graph
  /v1/services/summary:
    get:
      summary: List service summaries
      operationId: listServiceSummaries
      responses:
        "200":
          description: Service catalog with summaries
  /v1/dashboards:
    get:
      summary: List dashboards
      operationId: listDashboards
      responses:
        "200":
          description: List of tenant-scoped dashboards
    post:
      summary: Create dashboard
      operationId: createDashboard
      responses:
        "201":
          description: Created
  /v1/saved-views:
    get:
      summary: List saved views
      operationId: listSavedViews
    post:
      summary: Create saved view
      operationId: createSavedView
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    TraceResponse:
      type: object
      properties:
        trace_id: { type: string }
        spans:
          type: array
          items:
            type: object
    TraceListResponse:
      type: object
      properties:
        traces:
          type: array
          items:
            type: object
        total: { type: integer }
    LogListResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            type: object
        total: { type: integer }
security:
  - BearerAuth: []
