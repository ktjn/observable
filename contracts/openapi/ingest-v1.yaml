openapi: "3.1.0"
info:
  title: Observable Ingest API
  version: "1.0.0"
paths:
  /v1/traces:
    post:
      summary: Export OTLP traces
      operationId: exportTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportTraceServiceRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportTraceServiceResponse"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema: { type: integer }
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: rate_limit_exceeded
                  message:
                    type: string
                    example: Trace ingest rate limit exceeded
  /v1/logs:
    post:
      summary: Export OTLP logs
      operationId: exportLogs
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Accepted }
        "401": { description: Unauthorized }
  /v1/metrics:
    post:
      summary: Export OTLP metrics
      operationId: exportMetrics
      description: >
        Accepts OTLP/HTTP JSON metric exports for gauges, sums, and explicit histograms.
        Metric series identity is deterministic across repeated points with the same
        tenant, metric name, resource attributes, point attributes, type, monotonicity,
        temporality, service, and environment.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Accepted }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "403": { description: Viewer role cannot ingest metrics }
        "415": { description: Unsupported media type }
        "429":
          description: Rate limited
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema: { type: integer }
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: rate_limit_exceeded
                  message:
                    type: string
                    example: Metric ingest rate limit exceeded
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ExportTraceServiceRequest:
      type: object
      properties:
        resourceSpans:
          type: array
          items:
            type: object
    ExportTraceServiceResponse:
      type: object
      properties:
        partialSuccess:
          type: object
security:
  - BearerAuth: []
