openapi: "3.1.0"
info:
  title: Observable Ingest API
  version: "1.0.0"
paths:
  /v1/traces:
    post:
      summary: Export OTLP traces
      operationId: exportTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportTraceServiceRequest"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportTraceServiceResponse"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "429": { description: Rate limited }
  /v1/logs:
    post:
      summary: Export OTLP logs
      operationId: exportLogs
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Accepted }
        "401": { description: Unauthorized }
  /v1/metrics:
    post:
      summary: Export OTLP metrics
      operationId: exportMetrics
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Accepted }
        "401": { description: Unauthorized }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ExportTraceServiceRequest:
      type: object
      properties:
        resourceSpans:
          type: array
          items:
            type: object
    ExportTraceServiceResponse:
      type: object
      properties:
        partialSuccess:
          type: object
security:
  - BearerAuth: []
