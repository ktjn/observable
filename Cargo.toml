[workspace]
resolver = "2"
members = [
    "libs/domain",
    "services/ingest-gateway",
    "services/auth-service",
    "services/stream-processor",
    "services/storage-writer",
    "services/query-api",
]

[workspace.dependencies]
tokio              = { version = "1", features = ["full"] }
axum               = { version = "0.7", features = ["json", "macros"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
uuid               = { version = "1", features = ["v4", "serde"] }
anyhow             = "1"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
bytes              = "1"
prost              = "0.12"
tonic              = "0.11"
sqlx               = { version = "0.7", features = ["postgres", "runtime-tokio", "uuid", "chrono"] }
clickhouse         = { version = "0.15", features = ["uuid"] }
rdkafka            = { version = "0.36", features = ["tokio", "cmake-build"] }
chrono             = { version = "0.4", features = ["serde"] }
config             = "0.14"
governor           = { version = "0.8", features = [] }
