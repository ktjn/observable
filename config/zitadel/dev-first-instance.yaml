# config/zitadel/dev-first-instance.yaml
#
# Processed once by Zitadel on first start-from-init.
# Creates the IAM owner org, a bootstrap service account, and the dev human admin.
# PatPath causes Zitadel to write the service account's PAT to /bootstrap/admin-pat.txt.
# The zitadel-bootstrap container reads that PAT to create the Observable OIDC app.
FirstInstance:
  InstanceName: Observable Dev
  PatPath: /bootstrap/admin-pat.txt
  Org:
    Name: Observable
    Machine:
      Machine:
        UserName: bootstrap-sa
        Name: Bootstrap Service Account
      Pat:
        ExpirationDate: "2099-01-01T00:00:00Z"
    Human:
      UserName: admin
      FirstName: Dev
      LastName: Admin
      Email:
        Address: admin@dev.observable
        IsEmailVerified: true
      Password: ${OBSERVABLE_DEV_ADMIN_PASSWORD:-Dev@Admin1234!}
      PasswordChangeRequired: false
