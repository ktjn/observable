name: Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify release tag and source commit
        id: version
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/verify-version.sh

          version="$(tr -d '[:space:]' < VERSION)"
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "release tag is '$GITHUB_REF_NAME', expected '$expected_tag'" >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "release tag $GITHUB_REF_NAME does not point to a commit contained in origin/main" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$expected_tag" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/observable-services" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image archive
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: false
          outputs: type=oci,dest=/tmp/observable-services-${{ steps.version.outputs.tag }}-linux-amd64.oci.tar
          tags: observable-services:${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=release-linux-amd64
          cache-to: type=gha,mode=max,scope=release-linux-amd64
          provenance: false
          sbom: false

      - name: Publish multi-architecture image
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=release-multiarch
          cache-to: type=gha,mode=max,scope=release-multiarch
          provenance: false
          sbom: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: '4.2.3'

      - name: Package Helm chart and checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          mkdir -p dist

          mv "/tmp/observable-services-${tag}-linux-amd64.oci.tar" dist/
          helm dependency build charts/observable
          helm package charts/observable --destination dist

          expected_chart="dist/observable-${version}.tgz"
          if [[ ! -f "$expected_chart" ]]; then
            echo "expected Helm package $expected_chart was not produced" >&2
            exit 1
          fi

          (
            cd dist
            sha256sum * > SHA256SUMS
          )

      - name: Log in to GHCR for Helm
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish Helm chart to GHCR
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          helm push "dist/observable-${version}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts"

      - name: Upload tag-bound release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: observable-${{ steps.version.outputs.tag }}-linux-amd64
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.version.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          sbom-path: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.version.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}

      - name: Attest Helm chart provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/observable-${{ steps.version.outputs.version }}.tgz'

      - name: Attest OCI archive provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/observable-services-${{ steps.version.outputs.tag }}-linux-amd64.oci.tar'
