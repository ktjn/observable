name: Version consistency

on:
  pull_request:
    branches: [main]
    paths:
      - VERSION
      - apps/frontend/package.json
      - models/pyproject.toml
      - services/*/Cargo.toml
      - libs/*/Cargo.toml
      - charts/*/Chart.yaml
      - scripts/verify-version.py
      - .github/workflows/version-consistency.yml
  push:
    branches: [main]
    paths:
      - VERSION
      - apps/frontend/package.json
      - models/pyproject.toml
      - services/*/Cargo.toml
      - libs/*/Cargo.toml
      - charts/*/Chart.yaml
      - scripts/verify-version.py
      - .github/workflows/version-consistency.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify product version consistency
        run: python3 scripts/verify-version.py
