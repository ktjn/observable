name: Build & Test
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      # --- Backend (Rust in Docker) ---
      - name: Rust - Formatter
        uses: docker/build-push-action@v6
        with:
          context: .
          target: rust-formatter
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rust - Linter
        uses: docker/build-push-action@v6
        with:
          context: .
          target: rust-linter
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rust - Tester
        uses: docker/build-push-action@v6
        with:
          context: .
          target: rust-tester
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Final Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: observable-services:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Frontend (on Runner for faster parallel-ish GHA feedback) ---
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run lint --workspace=apps/frontend
      - run: npm run test --workspace=apps/frontend -- --run
      - run: npm run build --workspace=apps/frontend

      # --- Helm ---
      - uses: azure/setup-helm@v5
        with:
          version: "3.14.4"
      - run: bash scripts/helm-lint.sh

      # --- Integration Tests ---
      - name: Docker Compose Smoke Test
        run: docker compose up smoke-test --abort-on-container-exit

      - name: Set up kind
        uses: helm/kind-action@v1.14.0
        with:
          install_only: true
          version: "v0.22.0"

      - name: Kind Integration Test
        run: bash scripts/kind-test.sh --skip-build

      - name: Collect kind logs on failure
        if: failure()
        run: bash scripts/collect-kind-logs.sh

      # --- Scheduled/Manual Only ---
      - name: Performance Smoke Test
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: docker compose up perf-smoke --abort-on-container-exit
