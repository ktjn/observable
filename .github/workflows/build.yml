name: Build & Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.surfaces.outputs.backend }}
      frontend: ${{ steps.surfaces.outputs.frontend }}
      helm: ${{ steps.surfaces.outputs.helm }}
      smoke: ${{ steps.surfaces.outputs.smoke }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: surfaces
        run: bash scripts/ci-changed-surfaces.sh "${{ github.event.pull_request.base.sha || github.event.before }}" "${{ github.sha }}"

  backend:
    needs: [changes]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == '1'
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.10

      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --lib --bins
      - run: cargo build --release --workspace
      - run: sccache --show-stats

      - name: Stage release binaries for Docker context
        run: |
          mkdir -p bin
          cp target/release/auth-service target/release/storage-writer \
             target/release/stream-processor target/release/ingest-gateway \
             target/release/query-api target/release/alert-evaluator \
             target/release/admin-service bin/

      - uses: docker/setup-buildx-action@v4

      - name: Build and load final image (prebuilt-binary stage)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-ci
          load: true
          tags: observable-services:local
          cache-from: type=gha,scope=observable-services-runtime
          cache-to: type=gha,mode=max,scope=observable-services-runtime

      - name: Export image
        run: docker save observable-services:local | gzip > /tmp/image.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  frontend:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run lint --workspace=apps/frontend
      - run: npm run build --workspace=apps/frontend
      - run: npm run test --workspace=apps/frontend -- --run

  helm:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.helm == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: "3.14.4"
      - run: bash scripts/helm-lint.sh

  smoke:
    needs: [changes, backend]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.smoke == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit

  perf-smoke:
    needs: [changes, backend]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit
      - run: docker compose up perf-smoke --abort-on-container-exit
