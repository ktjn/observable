name: Build & Test
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Formatter (cargo fmt)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: formatter
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Linter (clippy)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: linter
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tester (cargo test)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: tester
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Final Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: observable-services:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image
        run: docker save observable-services:local | gzip > /tmp/image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run lint --workspace=apps/frontend
      - run: npm run build --workspace=apps/frontend
      - run: npm run test --workspace=apps/frontend -- --run

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: "3.14.4"
      - run: bash scripts/helm-lint.sh

  smoke:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit

  kind:
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: "3.14.4"
      - name: Set up kind
        uses: helm/kind-action@v1.14.0
        with:
          install_only: true
          version: "v0.22.0"
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - name: Run kind integration test
        run: bash scripts/kind-test.sh --skip-build
      - name: Collect kind logs on failure
        if: failure()
        run: bash scripts/collect-kind-logs.sh

  perf-smoke:
    needs: backend
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit
      - run: docker compose up perf-smoke --abort-on-container-exit
