name: Build & Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'spec/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.surfaces.outputs.backend }}
      frontend: ${{ steps.surfaces.outputs.frontend }}
      helm: ${{ steps.surfaces.outputs.helm }}
      smoke: ${{ steps.surfaces.outputs.smoke }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: surfaces
        run: bash scripts/ci-changed-surfaces.sh "${{ github.event.pull_request.base.sha || github.event.before }}" "${{ github.sha }}"

  backend:
    needs: [changes]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # ubuntu-latest ships ~20-30GB of preinstalled toolchains we don't use
      # (Android SDK, .NET, GHC, unused Docker images). A full cold rebuild
      # after a Cargo.lock-changing dependency bump (new cache key, so no
      # warm target/ to reuse) plus the rust:bookworm build image and the
      # runtime image build can otherwise exhaust the runner's free space
      # mid-build. Reclaim that space up front.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo-ci/registry
            ~/.cargo-ci/git
            ~/.cargo-ci/target
            ~/.cache/sccache
          key: cargo-sccache-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-sccache-

      # Build/lint/test inside rust:1.97.0-bookworm (same glibc as the
      # debian:bookworm-slim runtime image) rather than natively on the
      # ubuntu-latest runner — ubuntu-latest's glibc is newer than bookworm's,
      # and binaries built against it fail to load in the runtime image.
      #
      # sccache's GHA cache backend (SCCACHE_GHA_ENABLED) targets GitHub's
      # old cache service API and silently fails every write against the
      # current one (0 hits, all "Cache write errors") — use sccache's local
      # disk cache instead, persisted across runs via actions/cache above.
      #
      # target/ must ALSO persist across runs (not just registry/sccache):
      # a fresh checkout has no target/, so every build-script crate (most
      # of the dependency tree) gets a fresh OUT_DIR hash, which leaks into
      # its rustc invocation and busts sccache's cache key even when the
      # source is byte-identical to the previous run.
      - name: Build, lint, test
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /sccache
          CARGO_INCREMENTAL: "0"
        run: |
          mkdir -p ~/.cargo-ci/registry ~/.cargo-ci/git ~/.cargo-ci/target ~/.cache/sccache
          docker run --rm \
            -v "$PWD":/app -w /app \
            -v "$(command -v sccache)":/usr/local/bin/sccache:ro \
            -v "$HOME/.cargo-ci/registry":/usr/local/cargo/registry \
            -v "$HOME/.cargo-ci/git":/usr/local/cargo/git \
            -v "$HOME/.cargo-ci/target":/app/target \
            -v "$HOME/.cache/sccache":/sccache \
            -e RUSTC_WRAPPER -e SCCACHE_DIR -e CARGO_INCREMENTAL \
            -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" \
            rust:1.97.0-bookworm bash -c '
              set -euo pipefail
              rustup component add rustfmt clippy
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                build-essential cmake libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev
              cargo fmt --check
              cargo clippy --workspace --all-targets -- -D warnings
              cargo test --workspace --lib --bins
              cargo build --release --workspace
              sccache --show-stats
              # Container runs as root, so cache files end up root-owned on the
              # host mounts; chown back to the runner user or actions/cache'\''s
              # post-job tar step cannot read them to persist the cache.
              chown -R "$HOST_UID:$HOST_GID" /usr/local/cargo/registry /usr/local/cargo/git /sccache /app/target
            '

      - name: Stage release binaries for Docker context
        run: |
          mkdir -p bin
          cp ~/.cargo-ci/target/release/auth-service ~/.cargo-ci/target/release/storage-writer \
             ~/.cargo-ci/target/release/stream-processor ~/.cargo-ci/target/release/ingest-gateway \
             ~/.cargo-ci/target/release/query-api ~/.cargo-ci/target/release/alert-evaluator \
             ~/.cargo-ci/target/release/admin-service bin/

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and load final image (prebuilt-binary stage)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime-ci
          load: true
          tags: observable-services:local
          cache-from: type=gha,scope=observable-services-runtime
          cache-to: type=gha,mode=max,scope=observable-services-runtime

      - name: Export image
        run: docker save observable-services:local | gzip > /tmp/image.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  frontend:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run lint --workspace=apps/frontend
      - run: npm run build --workspace=apps/frontend
      - run: npm run test --workspace=apps/frontend -- --run

  helm:
    needs: changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.helm == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: "4.2.3"
      - run: bash scripts/helm-lint.sh

  smoke:
    needs: [changes, backend]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.smoke == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit

  perf-smoke:
    needs: [changes, backend]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar.gz
      - run: docker compose up smoke-test --abort-on-container-exit
      - run: docker compose up perf-smoke --abort-on-container-exit
