name: kind integration test
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 02 * * *"  # 02:30 UTC nightly
  workflow_dispatch:

jobs:
  kind:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.4"

      - name: Set up kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: "v0.22.0"

      - name: Build service image
        run: docker build --tag observable-services:local .

      - name: Run kind integration test
        run: bash scripts/kind-test.sh --skip-build

      - name: Upload kind logs on failure
        if: failure()
        run: |
          kubectl get all --namespace observable || true
          kubectl describe pods --namespace observable || true
          for deploy in auth-service ingest-gateway stream-processor storage-writer query-api alert-evaluator; do
            echo "=== $deploy logs ==="
            kubectl logs deployment/$deploy --namespace observable --tail=50 || true
          done
