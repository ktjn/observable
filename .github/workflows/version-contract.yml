name: Version Contract

on:
  pull_request:
    branches: [main]
    paths:
      - VERSION
      - 'Cargo.toml'
      - 'services/*/Cargo.toml'
      - 'libs/*/Cargo.toml'
      - 'apps/frontend/package.json'
      - 'charts/*/Chart.yaml'
      - 'scripts/verify-version.py'
      - '.github/workflows/version-contract.yml'
  push:
    branches: [main]
    paths:
      - VERSION
      - 'Cargo.toml'
      - 'services/*/Cargo.toml'
      - 'libs/*/Cargo.toml'
      - 'apps/frontend/package.json'
      - 'charts/*/Chart.yaml'
      - 'scripts/verify-version.py'
      - '.github/workflows/version-contract.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify release version contract
        run: python3 scripts/verify-version.py
