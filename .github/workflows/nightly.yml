name: Nightly Smoke Test
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y cmake libsasl2-dev libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start infrastructure
        run: docker compose up -d --wait
      - name: Run migrations
        run: bash scripts/migrate.sh
      - name: Build services
        run: cargo build --release
      - name: Start services
        run: bash scripts/start-services.sh
      - name: Run smoke test
        run: bash tests/e2e/smoke_test.sh
