name: PR
on:
  pull_request:
    branches: [main]
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y cmake libsasl2-dev libcurl4-openssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy,rustfmt" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "22", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run lint --workspace=apps/frontend
      - run: npm run build --workspace=apps/frontend
      - run: npm run test --workspace=apps/frontend -- --run
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run end-to-end smoke test
        run: docker compose up --build smoke-test --abort-on-container-exit
